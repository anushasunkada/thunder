server:
  hostname: "localhost"
  port: 8095

tls:
  cert_file: "repository/resources/security/server.cert"
  key_file: "repository/resources/security/server.key"

database:
  config:
    type: "sqlite"
    sqlite:
      path: "repository/database/configdb.db"
      options: "_journal_mode=WAL&_busy_timeout=60000&_pragma=foreign_keys(1)"
  runtime:
    type: "sqlite"
    sqlite:
      path: "repository/database/runtimedb.db"
      options: "_journal_mode=WAL&_busy_timeout=60000&_pragma=foreign_keys(1)"
  user:
    type: "sqlite"
    sqlite:
      path: "repository/database/userdb.db"
      options: "_journal_mode=WAL&_busy_timeout=60000&_pragma=foreign_keys(1)"

flow:
  max_version_history: 3

passkey:
  allowed_origins:
    - "https://localhost:8095"
    - "http://localhost:8095"

consent:
  enabled: false

oauth:
  allow_wildcard_redirect_uri: true
  auth_class:
    amr:
      Password:
        type: PWD
      OTP:
        type: OTP
      L1-bio-device:
        type: BIO
    acr_amr:
      "urn:thunder:acr:password":
        - Password
      "urn:thunder:acr:generated-code":
        - OTP
      "urn:thunder:acr:biometrics":
        - L1-bio-device
